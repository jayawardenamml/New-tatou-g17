name: Python Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TEST_MODE: "true"
      FLAG_2: ${{ secrets.FLAG_2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.x"

      - name: Install dependencies
        working-directory: server
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run watermark unit coverage tests (TEST_MODE)
        working-directory: server
        env:
          TEST_MODE: "true"
          TESTING: "true"
          FLAG_2: ${{ secrets.FLAG_2 }}
        run: |
          . .venv/bin/activate

          python -m pytest \
            test/test_watermark_unit_coverage.py \
            --cov=src \
            --cov-branch \
            --cov-report=html:test-results/coverage \
            --cov-report=term \
            --junit-xml=test-results/junit.xml \
            --html=test-results/report.html \
            --self-contained-html \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if tests fail
        with:
          name: test-results
          path: server/test-results/
          retention-days: 30

      - name: Publish test results summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: server/test-results/junit.xml
          check_name: Test Results

      - name: Comment coverage on PR
        uses: py-cov-action/python-coverage-comment-action@v3
        if: github.event_name == 'pull_request'
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  docker:
    runs-on: ubuntu-latest
    needs: test   # Only build/push Docker image if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            erangis/group17:latest
            erangis/group17:${{ github.sha }}