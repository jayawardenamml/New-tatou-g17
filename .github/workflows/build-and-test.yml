name: Python Tests

permissions:
  contents: write
  pull-requests: write
  checks: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-mock:
    runs-on: ubuntu-latest

    env:
      TEST_MODE: "true"
      FLAG_2: ${{ secrets.FLAG_2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.x"

      - name: Install dependencies
        working-directory: server
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run watermark unit coverage tests (TEST_MODE)
        working-directory: server
        env:
          TEST_MODE: "true"
          TESTING: "true"
          FLAG_2: ${{ secrets.FLAG_2 }}
        run: |
          . .venv/bin/activate

          python -m pytest \
            test/test_watermark_unit_coverage.py \
            --cov=src \
            --cov-branch \
            --cov-report=html:test-results/coverage \
            --cov-report=term \
            --junit-xml=test-results/junit.xml \
            --html=test-results/report.html \
            --self-contained-html \
            -v

      - name: Upload test results (mock)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-mock
          path: server/test-results/
          retention-days: 30

  test-full:
    runs-on: ubuntu-latest
    needs: test-mock

    env:
      MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
      MARIADB_USER: ${{ secrets.MARIADB_USER }}
      MARIADB_PASSWORD: ${{ secrets.MARIADB_PASSWORD }}
      FLAG_2: ${{ secrets.FLAG_2 }}

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: tatou
          MARIADB_USER: tatou_user
          MARIADB_PASSWORD: tatou_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root --password=rootpassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.x"

      - name: Install dependencies
        working-directory: server
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Wait for MariaDB
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client
          for i in {1..30}; do
            if mariadb-admin ping -h"127.0.0.1" -P"3306" -u"root" -p"rootpassword" --silent; then
              echo "MariaDB is ready!"
              break
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done

      - name: Initialize database schema
        run: |
          mariadb -h 127.0.0.1 -P 3306 -u root -p"rootpassword" tatou < db/tatou.sql

      - name: Run full test suite with coverage
        working-directory: server
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: tatou
          DB_USER: tatou_user
          DB_PASSWORD: tatou_password
          FLAG_2: ${{ secrets.FLAG_2 }}
        run: |
          . .venv/bin/activate

          python -m pytest \
            --cov=src \
            --cov-branch \
            --cov-report=html:test-results/coverage \
            --cov-report=term \
            --junit-xml=test-results/junit.xml \
            --html=test-results/report.html \
            --self-contained-html \
            -v

      - name: Upload test results (full)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full
          path: server/test-results/
          retention-days: 30

      - name: Publish test results summary (full)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: server/test-results/junit.xml
          check_name: Full Test Results

      - name: Comment coverage on PR (full suite)
        uses: py-cov-action/python-coverage-comment-action@v3
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        with:
          GITHUB_TOKEN: ${{ github.token }}
          coverage_path: server/.coverage
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  docker:
    runs-on: ubuntu-latest
    needs: [test-mock, test-full]   # Only build/push Docker image if tests pass
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            std5225/new-tatou-g17:latest
            std5225/new-tatou-g17:${{ github.sha }}